name: Elixir CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimum:
    name: Minimum / OTP 24.3.4.17 / Elixir 1.15.0
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up minimum Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "24.3.4.17"
          elixir-version: "1.15.0"
          version-type: strict

      - name: Restore Mix cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build/dev
            _build/test
          key: ${{ runner.os }}-mix-min-v1-otp-24.3.4.17-elixir-1.15.0-${{ hashFiles('mix.exs', 'mix.lock') }}

      - name: Fetch dependencies
        run: mix deps.get --check-locked

      - name: Check lockfile
        run: mix deps.unlock --check-unused

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile project
        run: mix compile --warnings-as-errors

      - name: Generate documentation
        run: mix docs --warnings-as-errors

      - name: Run tests
        run: mix test --warnings-as-errors

  tests:
    name: Current / OTP 29.0.3 / Elixir 1.20.2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MIX_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Restore Mix cache
        uses: actions/cache@v6
        with:
          path: |
            deps
            _build/test
          key: ${{ runner.os }}-mix-v1-${{ hashFiles('.tool-versions', 'mix.exs', 'mix.lock') }}

      - name: Fetch dependencies
        run: mix deps.get --check-locked

      - name: Check lockfile
        run: mix deps.unlock --check-unused

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile project
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --strict

      # coveralls.github already runs the test suite on pushes, avoiding a duplicate test run.
      - name: Run tests
        if: github.event_name == 'pull_request'
        run: mix test --warnings-as-errors

      - name: Run tests and post coverage
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: mix coveralls.github --warnings-as-errors

  examples:
    name: Compile example / ${{ matrix.example }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        example: [echo_server, login_server, minecraft_ex]

    defaults:
      run:
        working-directory: examples/${{ matrix.example }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Restore Mix cache
        uses: actions/cache@v6
        with:
          path: |
            examples/${{ matrix.example }}/deps
            examples/${{ matrix.example }}/_build/dev
          key: ${{ runner.os }}-mix-example-${{ matrix.example }}-v1-${{ hashFiles('.tool-versions', 'mix.exs', 'mix.lock', 'examples/**/mix.exs', 'examples/**/mix.lock') }}

      - name: Fetch dependencies
        run: mix deps.get --check-locked

      - name: Check lockfile
        run: mix deps.unlock --check-unused

      - name: Compile dependencies
        run: mix deps.compile

      - name: Compile example
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted
